name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  version:
    name: Bump Version & Tag
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}
      prev_tag: ${{ steps.bump.outputs.prev_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        id: bump
        run: |
          CURRENT=$(grep '^version = ' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          IFS='.' read -r major minor patch <<< "$CURRENT"
          case "${{ inputs.bump }}" in
            major) major=$((major + 1)); minor=0; patch=0 ;;
            minor) minor=$((minor + 1)); patch=0 ;;
            patch) patch=$((patch + 1)) ;;
          esac
          VERSION="${major}.${minor}.${patch}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Bumping ${CURRENT} → ${VERSION}"
          PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          echo "prev_tag=${PREV_TAG}" >> "$GITHUB_OUTPUT"
          sed -i "0,/^version = \"${CURRENT}\"/s//version = \"${VERSION}\"/" Cargo.toml

      - name: Update lockfile
        run: cargo generate-lockfile

      - name: Commit, tag, push
        run: |
          VERSION="${{ steps.bump.outputs.version }}"
          git add Cargo.toml Cargo.lock
          git commit -m "release: v${VERSION}"
          git tag "v${VERSION}"
          git push origin HEAD:main --tags

  publish:
    name: Publish to crates.io
    needs: version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ needs.version.outputs.version }}
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        # Let the benign "already uploaded" through (re-run safety); fail on
        # every other error (bad token, verify fail, etc.).
        run: |
          set -euo pipefail
          if cargo publish 2>&1 | tee /tmp/publish.log; then
            exit 0
          fi
          if grep -q "is already uploaded" /tmp/publish.log; then
            echo "::warning::version already on crates.io — skipping"
            exit 0
          fi
          echo "::error::cargo publish failed; see log above"
          exit 1

  github-release:
    name: GitHub Release
    needs: [version, publish]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ needs.version.outputs.version }}
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          PREV="${{ needs.version.outputs.prev_tag }}"
          if [ -n "$PREV" ]; then
            NOTES=$(git log --pretty=format:'- %s' "${PREV}..v${VERSION}")
          else
            NOTES="Initial release."
          fi
          gh release create "v${VERSION}" --title "v${VERSION}" --notes "${NOTES}"
